{% extends 'base.html' %}

{% block content %}
<div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 40px auto;">
    <h2 style="color: #2c3e50; margin-top: 0; text-align: center;">Edit Student: {{ student.name }}</h2>
    
    <form method="POST" action="{{ url_for('edit_student', id=student.id) }}">
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Linked Account User ID</label>
            <!-- Disabled because we shouldn't change the underlying user account easily -->
            <input type="text" value="User ID {{ student.user_id }}" disabled style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #eee;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Full Name</label>
            <input type="text" name="name" value="{{ student.name }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Roll Number</label>
            <input type="text" name="roll_number" value="{{ student.roll_number }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Course / Branch</label>
            <input type="text" name="course" value="{{ student.course }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 12px; background: #f39c12; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">Update Student</button>
            <a href="{{ url_for('students') }}" style="flex: 1; padding: 12px; background: #95a5a6; color: white; text-align: center; text-decoration: none; border-radius: 4px; font-size: 16px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
