{% extends 'base.html' %}

{% block content %}
<div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 40px auto;">
    <h2 style="color: #2c3e50; margin-top: 0; text-align: center;">Add New Student</h2>
    
    <form method="POST" action="{{ url_for('add_student') }}">
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Link to Student Account (User)</label>
            <select name="user_id" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="" disabled selected>Select an unlisted student account...</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }} (ID: {{ user.id }})</option>
                {% else %}
                <option value="" disabled>No new student accounts found! Have them register first.</option>
                {% endfor %}
            </select>
            <small style="color: #7f8c8d; display: block; margin-top: 5px;">* The student must first register an account before an Admin can add their details.</small>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Full Name</label>
            <input type="text" name="name" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Roll Number</label>
            <input type="text" name="roll_number" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Course / Branch</label>
            <input type="text" name="course" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">Save Student</button>
            <a href="{{ url_for('students') }}" style="flex: 1; padding: 12px; background: #95a5a6; color: white; text-align: center; text-decoration: none; border-radius: 4px; font-size: 16px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
