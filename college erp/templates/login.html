{% extends 'base.html' %}

{% block content %}
<div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto;">
    <h2 style="text-align: center; margin-top: 0; color: #2c3e50;">Secure Login</h2>
    
    <!-- Login Form sending POST request to /login -->
    <form method="POST" action="{{ url_for('login') }}">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Username</label>
            <input type="text" name="username" required autocomplete="off"
                   style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555;">Password</label>
            <input type="password" name="password" required 
                   style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        
        <button type="submit" 
                style="width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
            Login
        </button>
    </form>
    
    <div style="margin-top: 20px; text-align: center;">
        <p>Don't have an account? <a href="{{ url_for('register') }}" style="color: #3498db; text-decoration: none; font-weight: bold;">Register here</a></p>
    </div>
    
    <div style="margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 4px; text-align: center; font-size: 0.9em; color: #666;">
        <strong>First-time access?</strong><br>
        Admin Username: <code>admin</code><br>
        Admin Password: <code>admin123</code>
    </div>
</div>
{% endblock %}
